name = "anthropic-openai-proxy"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Non-secret configuration. Override per environment as needed.
[vars]
# OpenAI-compatible upstream base URL (must include the /v1 segment if the
# upstream uses one), e.g. "https://api.openai.com/v1" or
# "https://my-gateway.example.com/v1".
OPENAI_BASE_URL = "https://api.openai.com/v1"
# Optional JSON object remapping incoming Anthropic model names to upstream
# model names, e.g. '{"claude-sonnet-4-20250514": "gpt-4o"}'.
MODEL_MAP = "{}"
# Fallback upstream model used when the incoming model is not in MODEL_MAP.
# Leave empty to pass the incoming model name through unchanged.
DEFAULT_MODEL = ""

# Secrets (set with `wrangler secret put <NAME>`):
#   OPENAI_API_KEY  - key sent to the upstream as `Authorization: Bearer ...`.
#                     If unset, the client's `x-api-key` header is forwarded.
